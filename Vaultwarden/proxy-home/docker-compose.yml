##
## adguard/dnsproxy: DNS-over-HTTPS gateway for the Vaultwarden VM
## (and any other LAN client pointed here).
##
## --- why this exists -----------------------------------------------------
##
## This container runs on the `proxy-home` VM, which has become the unified
## outbound proxy for the Vaultwarden VM:
##   - Squid (port 3128, same host)   → HTTP/HTTPS egress, allowlist-enforced.
##   - dnsproxy (this container, :53) → DNS, encrypted to Cloudflare Family DoH.
##
## Before this was added, the Vaultwarden VM resolved names by plaintext
## UDP straight to an upstream resolver (1.1.1.3). That left two gaps:
##
##   1. No visibility: every DNS query the VM made (Let's Encrypt
##      endpoints, Cloudflare tunnel, CrowdSec hub, apt mirrors, the
##      Vaultwarden domain itself) was invisible to us, so a compromise
##      that started phoning home would not show up in any log.
##   2. In-LAN sniffability: anything on the DMZ segment that could
##      MITM the link saw every hostname the vault resolved.
##
## Pointing the Vaultwarden VM's /etc/resolv.conf at this host closes
## both gaps. Every query is logged verbosely to /srv/dnsproxy-logs/ on
## this host (tailed by the Wazuh agent, see README "LAN DoH gateway"),
## and the upstream hop is encrypted DoH instead of plaintext UDP.
##
## Operationally paired with the Vaultwarden compose, even though it
## lives on a different VM with its own compose file. If this container
## is down, the Vaultwarden VM loses DNS; it does not fall back to a
## plaintext resolver.
##
## --- mechanics -----------------------------------------------------------
##
## Listens on 0.0.0.0:53 (all interfaces, standard DNS port) so LAN
## clients can use this host as their resolver. Outbound queries are
## encrypted to Cloudflare Family DNS-over-HTTPS. Bootstrap resolvers
## (1.1.1.1 / 1.0.0.1) are used to resolve `family.cloudflare-dns.com`
## itself before the DoH connection is established; without them the
## resolver can't get off the ground (it would need DNS to look up the
## DNS server).
##
## To use from another VM, point its DNS to this host's LAN IP. E.g. on
## a client VM: `nameserver <this-host-LAN-IP>` in /etc/resolv.conf, or
## set the LAN's DHCP server to advertise this host's IP as DNS.
##
## host network mode + NET_BIND_SERVICE cap are both required to bind
## directly to the host's :53 (privileged port).
##
## Heads-up: if this host is running systemd-resolved (default on Debian
## / Ubuntu desktop), it already has a stub resolver on 127.0.0.53:53.
## That doesn't conflict with 0.0.0.0:53 directly, but it's cleaner to
## disable systemd-resolved on a host that's serving as a DNS server:
##     sudo systemctl disable --now systemd-resolved
##     sudo rm /etc/resolv.conf  # remove the stub-resolver symlink
##     echo 'nameserver 127.0.0.1' | sudo tee /etc/resolv.conf
## Otherwise this host's own outbound DNS is going through the stub,
## not through dnsproxy.
##

services:
  dnsproxy:
    container_name: dnsproxy
    image: adguard/dnsproxy:latest

    security_opt:
      - no-new-privileges
    cap_drop:
      - ALL
    cap_add:
      # Bind to port 53 (privileged, <1024). Required when listening on
      # the standard DNS port for LAN clients.
      - NET_BIND_SERVICE

    # Read-only rootfs: dnsproxy reads config from CLI args, caches DNS
    # entries in memory (--cache), and writes its query log to a bind-
    # mounted file (the only legitimate write path). Nothing else is
    # written to disk under normal operation.
    read_only: true
    tmpfs:
      - /tmp

    deploy:
      resources:
        limits:
          memory: 64M
          cpus: "0.25"

    # host network: required so 0.0.0.0:53 binds to the host's actual
    # interfaces, reachable by other VMs on the LAN.
    network_mode: "host"

    # Bind-mount the host's /srv/dnsproxy-logs/ into the container so
    # dnsproxy's verbose query log is reachable from outside (Wazuh agent
    # tails it directly on the host). The container only needs rw access
    # to this single path; the rest of the rootfs stays read-only.
    volumes:
      - /srv/dnsproxy-logs:/var/log/dnsproxy

    # Note: dnsproxy has no built-in client-IP ACL flag (no --allowed-clients
    # or equivalent). Source-IP filtering is enforced by ufw on the host,
    # `sudo ufw status numbered` to inspect the active rules.
    command: >
      -l 0.0.0.0
      -p 53
      -u https://family.cloudflare-dns.com/dns-query
      -b 1.1.1.1:53
      -b 1.0.0.1:53
      --cache
      -v
      -o /var/log/dnsproxy/queries.log

    restart: unless-stopped

    # Stdout still captures startup messages + errors. The per-query
    # log goes to the bind-mounted file (above); stdout stays small,
    # so the rotation ceiling here can be modest.
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
