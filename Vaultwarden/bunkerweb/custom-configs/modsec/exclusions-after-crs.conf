# Rule of thumb: server→client (response-phase, rule IDs 95x / 98x) exclusions go here.
# Exclusions AFTER CRS, applied after all rules run (step 10 in BunkerWeb order)
# Use this for response body rules or to suppress alerts after CRS processing.
#
# After editing, restart the proxy: docker compose restart proxy
# ================================================================

# ================================================================
# Verified false positives (from /srv/bw-logs/modsec_audit.log)
# Active because these fire on legitimate Vaultwarden traffic.
# ================================================================

# --- 953101 (PL2): "PHP Information Leakage" on i18n locales ---
# Vaultwarden's English /locales/<lang>/messages.json legitimately contains
# the literal string "file size is" in error messages, which 953101 looks
# for as a PHP error-string signature. Vaultwarden is Rust, not PHP, so
# this rule is structurally a false positive for the entire app, but scoping
# narrowly to /locales/ is the conservative choice (other 953xxx rules
# still apply elsewhere).
SecRule REQUEST_URI "@beginsWith /locales/" \
  "id:200050,phase:3,pass,nolog,ctl:ruleRemoveById=953101"

