# Switch ModSecurity's audit log from the default multi-section "Native"
# format to JSON (one object per request). Purpose is purely operator-side
# convenience: jq queries against modsec_audit.log are cleaner than awk
# walking Native section markers. See Vaultwarden/MONITORING.local.md for
# the pipelines that depend on this.
#
# This change does NOT integrate with CrowdSec. The upstream
# crowdsecurity/modsecurity parser only handles inline modsec messages in
# nginx/apache error.log (text-format grok patterns); it does not parse
# the dedicated audit log file in any format. CrowdSec already gets the
# modsec signal indirectly because BunkerWeb writes inline modsec warnings
# to error.log, which bunkerity/bunkerweb-logs picks up.
#
# BunkerWeb does NOT expose this directive as an env var (verified: setting
# MODSECURITY_SEC_AUDIT_LOG_FORMAT in compose is silently ignored with a
# scheduler warning). The directive must be applied via custom-configs/modsec/
# instead, which BW appends to the rendered modsecurity.conf.

SecAuditLogFormat JSON
