# CRS paranoia tuning (BunkerWeb 1.6.9+)
#
# The MODSECURITY_CRS_PARANOIA_LEVEL env var was dropped in 1.6.9. Paranoia
# is now set via CRS's own mechanism — SecAction with setvar against the
# tx.*_paranoia_level tx vars. This file is loaded after crs-setup.conf and
# before CRS rules, so the higher-ID SecAction here overrides CRS's
# default-setting rule 900000.
#
# Two dials:
#   tx.detection_paranoia_level — level at which a rule FIRES at all.
#                                 Higher = more rules evaluated + logged.
#   tx.blocking_paranoia_level  — level at which a fired rule contributes
#                                 to the anomaly score (→ eventual block).
#                                 Must be <= detection level.
#
# Pattern: detection=2, blocking=1. Level-2 rules fire and show up in
# modsec_audit.log (so you can tune exclusions) but DON'T count toward
# blocking until you raise blocking_paranoia_level to 2 as well.
SecAction "id:900110,phase:1,nolog,pass,\
  setvar:tx.blocking_paranoia_level=1,\
  setvar:tx.detection_paranoia_level=2"
