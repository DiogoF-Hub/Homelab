# Rule of thumb: client→server (request-phase, rule IDs 9xx < 950) exclusions go here.
# Exclusions BEFORE CRS, applied before rules run (step 6 in BunkerWeb order)
# Use this to prevent rules from firing on known-safe requests.
# This is the preferred place for most exclusions.
#
# After editing, restart the proxy: `sudo su - poduser`, then `podman-compose restart bunkerweb`
# ================================================================

# Allow HTTP methods required by Vaultwarden API (PUT, PATCH, DELETE)
# Without this, rule 911100 blocks vault edit/delete operations
SecRule REQUEST_URI "@rx ^/(identity|api|accounts|notifications|icons|connect|admin)(/|$)" \
  "id:100014,phase:1,pass,nolog,setvar:tx.allowed_methods=GET HEAD POST OPTIONS PUT PATCH DELETE"

# ================================================================
# Verified false positives (from /srv/bw-logs/modsec_audit.log)
# Active because these fire on legitimate Bitwarden client traffic and
# would break the app the moment MODSECURITY_SEC_RULE_ENGINE flips to On.
# ================================================================

# --- 942120 (PL2): "SQL Operator Detected (==)" on encrypted blobs ---
# Encrypted Vaultwarden fields (cipher data, folder names, etc.) are base64
# with "==" padding, which the rule treats as a SQL operator. Fires on every
# POST/PUT carrying encrypted blobs. Scoped to /api/ciphers + /api/folders
# + /api/accounts/password (master-password change POSTs the re-encrypted
# key blob, same == padding); extend if other /api/* endpoints surface.
SecRule REQUEST_URI "@rx ^/api/(ciphers|folders|accounts/password)" \
  "id:100050,phase:1,pass,nolog,ctl:ruleRemoveById=942120"

# --- 942430 (PL2): "Restricted SQL char anomaly count > 12" on special-char-heavy payloads ---
# Three endpoints carry payloads with many special chars (".", "-", "_",
# "=" from base64url, JWT segment dots, or a whole URL) that trip the
# special-character counter:
#   - /notifications/hub?access_token=<JWT>  (Bitwarden live-sync WebSocket)
#   - /identity/connect/token                (OAuth-style login + refresh)
#   - /icons/change-password-uri?uri=<url>   (URL value passed as a param)
SecRule REQUEST_URI "@rx ^/(notifications/hub|identity/connect/token|icons/change-password-uri)" \
  "id:100051,phase:1,pass,nolog,ctl:ruleRemoveById=942430"

# --- 932240 (PL2): "Unix Command Injection evasion" on admin auth ---
# The argon2id-hashed admin_token has format
# $argon2id$v=19$m=...$<base64>$<base64>. The digit/quote/digit pattern in
# the hash trips this RCE evasion rule. Only fires on POST /admin/config;
# other 932xxx RCE rules still apply on the same endpoint.
SecRule REQUEST_URI "@beginsWith /admin/config" \
  "id:100052,phase:1,pass,nolog,ctl:ruleRemoveById=932240"

# --- 932200 (PL2): "RCE Bypass Technique" on admin save ---
# Same root cause as 932240: the argon2id-hashed admin_token value
# trips the rule's whitespace-class operator over the hash content.
# Confirmed in audit log: matched ARGS:json.admin_token with the
# $argon2id$... value. Same /admin/config scope as 932240.
SecRule REQUEST_URI "@beginsWith /admin/config" \
  "id:100055,phase:1,pass,nolog,ctl:ruleRemoveById=932200"

# --- 920230 (PL1): "Multiple URL Encoding Detected" on log_timestamp_format ---
# Vaultwarden's admin panel exposes a log line format string at
# ARGS:json.log_timestamp_format. Default is "%Y-%m-%d %H:%M:%S.%3f%z";
# the strftime tokens (%Y, %m, %d, %H, %M, %S, %3f, %z) match CRS's
# %[0-9a-fA-F]{2} multi-encoding heuristic, even though the field is
# a literal strftime template, not URL-encoded data. Same /admin/config
# scope as the 932xxx rules above.
SecRule REQUEST_URI "@beginsWith /admin/config" \
  "id:100056,phase:1,pass,nolog,ctl:ruleRemoveById=920230"

# --- 942131 (PL2): "SQL Operator Detected" on /admin login token ---
# The admin login form submits ARGS:token=<plaintext>; complex passwords
# with "$", "%", "^", etc. trip the SQL operator detector. The token is
# only compared against the argon2id hash configured in ADMIN_TOKEN, never
# used in a SQL query, so disabling this rule on the bare /admin endpoint
# is structurally safe. Other 942xxx rules still apply.
SecRule REQUEST_URI "@rx ^/admin/?$" \
  "id:100053,phase:1,pass,nolog,ctl:ruleRemoveById=942131"

# --- 931130 + 931100 (PL2): RFI rules on the icon lookup endpoint ---
# /icons/change-password-uri?uri=<url> takes a URL as a lookup KEY, the
# server doesn't actually fetch it (DISABLE_ICON_DOWNLOAD=true reinforces
# this). 931130 (off-domain reference) and 931100 (RFI URL pattern) both
# fire because there's a URL in a param, but no remote inclusion happens.
# Other 931xxx rules still apply on other paths.
SecRule REQUEST_URI "@beginsWith /icons/change-password-uri" \
  "id:100054,phase:1,pass,nolog,ctl:ruleRemoveById=931130,ctl:ruleRemoveById=931100"

