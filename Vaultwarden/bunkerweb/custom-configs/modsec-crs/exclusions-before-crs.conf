# Rule of thumb: client→server (request-phase, rule IDs 9xx < 950) exclusions go here.
# Exclusions BEFORE CRS — applied before rules run (step 6 in BunkerWeb order)
# Use this to prevent rules from firing on known-safe requests.
# This is the preferred place for most exclusions.
#
# After editing, restart the proxy: docker compose restart proxy
# ================================================================

# Allow HTTP methods required by Vaultwarden API (PUT, PATCH, DELETE)
# Without this, rule 911100 blocks vault edit/delete operations
SecRule REQUEST_URI "@rx ^/(identity|api|accounts|notifications|icons|connect|admin)(/|$)" \
  "id:100014,phase:1,pass,nolog,setvar:tx.allowed_methods=GET HEAD POST OPTIONS PUT PATCH DELETE"

# ================================================================
# Verified false positives (from /srv/bw-logs/modsec_audit.log)
# Active because these fire on legitimate Bitwarden client traffic and
# would break the app the moment MODSECURITY_SEC_RULE_ENGINE flips to On.
# ================================================================

# --- 942120 (PL2): "SQL Operator Detected (==)" on cipher add/edit ---
# Encrypted cipher fields (ARGS:json.login.password, json.login.username,
# json.login.fido2Credentials.*.counter, etc.) are base64 with "==" padding,
# which the rule treats as a SQL operator. Fires on every POST/PUT to
# /api/ciphers[/<uuid>].
SecRule REQUEST_URI "@beginsWith /api/ciphers" \
  "id:100050,phase:1,pass,nolog,ctl:ruleRemoveById=942120"

# --- 942430 (PL2): "Restricted SQL char anomaly count > 12" on live-sync ---
# /notifications/hub?access_token=<JWT> is the Bitwarden WebSocket sync
# endpoint; the JWT contains many "." "-" "_" "=" chars (base64url + JWT
# segment dots) that trip the special-character counter. Hits on every
# client connect/refresh.
SecRule REQUEST_URI "@beginsWith /notifications/hub" \
  "id:100051,phase:1,pass,nolog,ctl:ruleRemoveById=942430"

# --- 932240 (PL2): "Unix Command Injection evasion" on admin auth ---
# The argon2id-hashed admin_token has format
# $argon2id$v=19$m=...$<base64>$<base64> — the digit/quote/digit pattern in
# the hash trips this RCE evasion rule. Only fires on POST /admin/config;
# other 932xxx RCE rules still apply on the same endpoint.
SecRule REQUEST_URI "@beginsWith /admin/config" \
  "id:100052,phase:1,pass,nolog,ctl:ruleRemoveById=932240"

