# --- Multipart/form-data bypass on attachment upload (PL1, externally sourced) ---
# Rule 920120 inspects FILES|FILES_NAMES; reported FP on Vaultwarden attachment
# uploads. Scope is narrow on purpose, only the attachment endpoint, so this
# does not weaken multipart inspection elsewhere.
# Source: https://github.com/dani-garcia/vaultwarden/discussions/4099
# SecRule REQUEST_URI "@rx ^/api/ciphers/[^/]+/attachment/v2$" \
#   "id:100120,phase:1,pass,nolog,ctl:ruleRemoveById=920120"

