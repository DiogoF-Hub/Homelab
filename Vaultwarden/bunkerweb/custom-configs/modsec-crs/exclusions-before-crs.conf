# --- SQL injection false positives on login / token / accounts payloads ---
# Path regex covers the actual Vaultwarden routes that carry opaque
# credentials and JWT-shaped bodies: /identity/connect/* (token, authorize),
# /identity/accounts/prelogin, /api/accounts/*. Previous draft scoped to
# `(identity|api|connect)(/|$)` which both included a non-existent
# /connect/* and was overly broad for the rest of the API.
# SecRule REQUEST_URI "@rx ^/(identity/connect|identity/accounts|api/accounts)/" \
#   "id:100030,phase:1,pass,nolog,ctl:ruleRemoveById=942100"
SecRule REQUEST_URI "@rx ^/(identity/connect|identity/accounts|api/accounts)/" \
  "id:100031,phase:1,pass,nolog,ctl:ruleRemoveById=942200"

# --- XSS / RCE false positives on /api/ciphers/import-organization ---
# Documented FP source: MrCybertux's BunkerWeb + Vaultwarden production
# config (https://github.com/bunkerity/bunkerweb/issues/1790). The org
# import endpoint accepts a CLEARTEXT JSON payload (not encrypted blobs),
# which contains user-supplied entry names, URIs, notes, and password
# fields. Plain-text strings naturally trigger XSS heuristics and Windows-
# shell command-injection patterns. Earlier draft mis-described this as
# "XSS on encrypted vault data": the actual FP is specifically the import
# flow, not routine encrypted /api/* traffic (which trips 942120 / 942430
# instead, both already excluded).
# SecRule REQUEST_URI "@beginsWith /api/ciphers/import-organization" \
#   "id:100040,phase:1,pass,nolog,ctl:ruleRemoveById=941100"
# SecRule REQUEST_URI "@beginsWith /api/ciphers/import-organization" \
#   "id:100041,phase:1,pass,nolog,ctl:ruleRemoveById=941120"
# SecRule REQUEST_URI "@beginsWith /api/ciphers/import-organization" \
#   "id:100042,phase:1,pass,nolog,ctl:ruleRemoveById=941160"
# SecRule REQUEST_URI "@beginsWith /api/ciphers/import-organization" \
#   "id:100043,phase:1,pass,nolog,ctl:ruleRemoveById=932110"
# SecRule REQUEST_URI "@beginsWith /api/ciphers/import-organization" \
#   "id:100044,phase:1,pass,nolog,ctl:ruleRemoveById=932115"
# SecRule REQUEST_URI "@beginsWith /api/ciphers/import-organization" \
#   "id:100045,phase:1,pass,nolog,ctl:ruleRemoveById=949110"

