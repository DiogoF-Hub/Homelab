# --- 942450 (SQL hex encoding) on session cookies, PL3-readiness ---
# Vaultwarden's session cookies and JWTs occasionally contain random
# hex-looking substrings (0x... patterns) that trip the hex-encoding
# heuristic. Only fires meaningfully at PL3+; pre-stage.
# Source: netnea CRS false-positive analysis,
# https://www.netnea.com/cms/apache-tutorial-8_handling-false-positives-modsecurity-core-rule-set/
# SecRuleRemoveById 942450

