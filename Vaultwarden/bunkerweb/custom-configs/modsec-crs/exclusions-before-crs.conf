# Rule 920120 inspects FILES|FILES_NAMES; reported FP on Vaultwarden
# attachment uploads. Scope covers both the v2 path AND the legacy
# /attachment path: older clients (pre-Vaultwarden 1.30) and certain
# third-party Bitwarden tooling still POST to the non-/v2 endpoint.
