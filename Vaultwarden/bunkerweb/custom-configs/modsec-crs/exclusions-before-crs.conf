# Rule of thumb: client→server (request-phase, rule IDs 9xx < 950) exclusions go here.
# Exclusions BEFORE CRS — applied before rules run (step 6 in BunkerWeb order)
# Use this to prevent rules from firing on known-safe requests.
# This is the preferred place for most exclusions.
#
# After editing, restart the proxy: docker compose restart proxy
# ================================================================

# Allow HTTP methods required by Vaultwarden API (PUT, PATCH, DELETE)
# Without this, rule 911100 blocks vault edit/delete operations
SecRule REQUEST_URI "@rx ^/(identity|api|accounts|notifications|icons|connect|admin)(/|$)" \
  "id:100014,phase:1,pass,nolog,setvar:tx.allowed_methods=GET HEAD POST OPTIONS PUT PATCH DELETE"

