# Match the old Caddy config's header model exactly.
#
# Caddy's global `header` block set HSTS, X-Content-Type-Options,
# Referrer-Policy, Permissions-Policy, and Cross-Origin-Opener-Policy on every
# response, and deliberately did NOT set X-Frame-Options or Content-Security-
# Policy at the proxy layer. Vaultwarden manages those per endpoint (sends
# CSP+XFO on /admin and the vault UI, strips them on /2fa-connector.html so
# external 2FA iframes like Duo work). Caddy's `reverse_proxy` passed upstream
# response headers through unchanged.
#
# BunkerWeb's headers plugin injects XFO and CSP defaults on every path
# regardless of upstream, and setting the env vars to "" does not suppress
# this on 1.6.9. We restore Caddy parity with ngx_headers_more:
#
#   - Two `map` blocks (here, at http scope, the only scope where `map` is
#     valid) compute the outbound header value from `$upstream_http_*`. When
#     upstream didn't set the header the mapped value is the empty string.
#   - A paired `more_set_headers` pass at server scope (see
#     server-http/headers-passthrough-apply.conf) applies the mapped values.
#     `more_set_headers` with an empty value CLEARS the header, which wipes
#     BW's injected default where upstream was silent; with a non-empty
#     value it overrides BW's injection with upstream's real value.
#
# Why not `header_filter_by_lua_block`: OpenResty treats Lua header filters as
# scope-innermost-wins rather than additive, and BW already emits one at
# server scope (/etc/nginx/<server_name>/header-lua.conf) that dispatches to
# every headers-plugin hook. A second Lua block at http scope passes
# `nginx -t` but never runs, so BW's XFO/CSP injection still reaches the
# client. `ngx_headers_more` runs in phase order after BW's plugin and IS
# composable across scopes (a nested more_set_headers inside a location
# overrides the one at server scope), which is exactly what the TXT
# locations in server-http/security-txt-lang.conf rely on.
map $upstream_http_x_frame_options $bw_xfo_out {
    default $upstream_http_x_frame_options;
}

map $upstream_http_content_security_policy $bw_csp_out {
    default $upstream_http_content_security_policy;
}
