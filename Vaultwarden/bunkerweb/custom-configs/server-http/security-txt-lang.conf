# -------- /.well-known/security.txt --------
location = /.well-known/security.txt {
    default_type text/plain;
    alias /etc/bunkerweb/security.txt;

    # Global security headers (add_header in a location block overrides parent, so we repeat them)
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
    add_header X-Content-Type-Options "nosniff" always;
    # Referrer-Policy and Permissions-Policy use more_set_headers because
    # BW's headers plugin emits them via more_set_headers at server scope.
    # A location-scope `add_header` does NOT replace `more_set_headers` from
    # a parent scope (different nginx modules, they don't see each other),
    # so using add_header here produces duplicate headers. Nested
    # more_set_headers overrides the outer one, which is what we want.
    # HSTS / X-Content-Type-Options / Cross-Origin-Opener-Policy above are
    # safe as add_header. BW uses add_header for those, so location-scope
    # add_header replaces them cleanly.
    more_set_headers "Referrer-Policy: same-origin";
    more_set_headers "Permissions-Policy: accelerometer=(), ambient-light-sensor=(), autoplay=(), battery=(), camera=(), display-capture=(), document-domain=(), encrypted-media=(), execution-while-not-rendered=(), execution-while-out-of-viewport=(), fullscreen=(), geolocation=(), gyroscope=(), interest-cohort=(), magnetometer=(), microphone=(), midi=(), payment=(), picture-in-picture=(), screen-wake-lock=(), sync-xhr=(), usb=(), web-share=(), xr-spatial-tracking=()";
    more_set_headers "Cross-Origin-Opener-Policy: same-origin";

    # TXT-specific stricter headers
    # XFO and CSP use more_set_headers (not add_header) to override the
    # server-scope `more_set_headers` in headers-passthrough-apply.conf,
    # which would otherwise clear them (upstream is a file alias, not a
    # proxy_pass, so $upstream_http_* is empty for these paths).
    more_set_headers "Content-Security-Policy: default-src 'none'; base-uri 'none'; frame-ancestors 'none'";
    more_set_headers "X-Frame-Options: SAMEORIGIN";
    add_header Cross-Origin-Resource-Policy "same-origin" always;
    add_header X-Robots-Tag "noindex, nofollow" always;
    add_header X-XSS-Protection "0" always;
}

# -------- /security.txt -> redirect to canonical path --------
location = /security.txt {
    return 301 /.well-known/security.txt;
}

# -------- /robots.txt --------
location = /robots.txt {
    default_type text/plain;
    alias /etc/bunkerweb/robots.txt;

    # Global security headers
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
    add_header X-Content-Type-Options "nosniff" always;
    # Referrer-Policy and Permissions-Policy use more_set_headers because
    # BW's headers plugin emits them via more_set_headers at server scope.
    # A location-scope `add_header` does NOT replace `more_set_headers` from
    # a parent scope (different nginx modules, they don't see each other),
    # so using add_header here produces duplicate headers. Nested
    # more_set_headers overrides the outer one, which is what we want.
    # HSTS / X-Content-Type-Options / Cross-Origin-Opener-Policy above are
    # safe as add_header. BW uses add_header for those, so location-scope
    # add_header replaces them cleanly.
    more_set_headers "Referrer-Policy: same-origin";
    more_set_headers "Permissions-Policy: accelerometer=(), ambient-light-sensor=(), autoplay=(), battery=(), camera=(), display-capture=(), document-domain=(), encrypted-media=(), execution-while-not-rendered=(), execution-while-out-of-viewport=(), fullscreen=(), geolocation=(), gyroscope=(), interest-cohort=(), magnetometer=(), microphone=(), midi=(), payment=(), picture-in-picture=(), screen-wake-lock=(), sync-xhr=(), usb=(), web-share=(), xr-spatial-tracking=()";
    more_set_headers "Cross-Origin-Opener-Policy: same-origin";

    # TXT-specific stricter headers (see XFO/CSP note above)
    more_set_headers "Content-Security-Policy: default-src 'none'; base-uri 'none'; frame-ancestors 'none'";
    more_set_headers "X-Frame-Options: SAMEORIGIN";
    add_header Cross-Origin-Resource-Policy "same-origin" always;
    add_header X-Robots-Tag "noindex, nofollow" always;
    add_header X-XSS-Protection "0" always;
}
