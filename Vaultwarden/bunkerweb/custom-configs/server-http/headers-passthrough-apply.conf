# All outbound security headers are applied here (not via BW env vars) to
# keep behavior stable across BW version bumps. Env-var semantics have
# shifted in the past (e.g. 1.6.9 dropped MODSECURITY_CRS_PARANOIA_LEVEL,
# and CROSS_ORIGIN_OPENER_POLICY silently stopped emitting on proxied
# paths). Owning the full list here means future plugin changes can't
# silently drift the set of headers we ship.
#
# Smoke-test after each BW image bump:
#   curl -sI https://vault.cookiefamily.org/
# Diff against the header set below. Anything extra/missing = investigate.
#
# Per-path overrides that still apply in spite of these globals:
#   - /robots.txt, /.well-known/security.txt, /security.txt -> see
#     security-txt-lang.conf. Their `location` blocks re-emit strict
#     values; nested more_set_headers beats outer scope.
#   - X-Frame-Options / Content-Security-Policy pass through from
#     Vaultwarden via the $bw_xfo_out / $bw_csp_out maps (defined in
#     http/headers-upstream-passthrough.conf) so Vaultwarden keeps
#     per-endpoint control (Duo iframe on /2fa-connector.html, etc.).

# --- Passthrough from upstream (Vaultwarden-managed per-endpoint) ---
# Upstream sent header -> value passes through; upstream sent nothing ->
# empty value clears the header (matches Caddy's reverse_proxy).
more_set_headers "X-Frame-Options: $bw_xfo_out";
more_set_headers "Content-Security-Policy: $bw_csp_out";

# --- Global static headers (applied to every response) ---
more_set_headers "Strict-Transport-Security: max-age=31536000; includeSubDomains; preload";
more_set_headers "X-Content-Type-Options: nosniff";
more_set_headers "Referrer-Policy: same-origin";
more_set_headers "Permissions-Policy: accelerometer=(), ambient-light-sensor=(), autoplay=(), battery=(), camera=(), display-capture=(), document-domain=(), encrypted-media=(), execution-while-not-rendered=(), execution-while-out-of-viewport=(), fullscreen=(), geolocation=(), gyroscope=(), interest-cohort=(), magnetometer=(), microphone=(), midi=(), payment=(), picture-in-picture=(), screen-wake-lock=(), sync-xhr=(), usb=(), web-share=(), xr-spatial-tracking=()";
more_set_headers "Cross-Origin-Opener-Policy: same-origin";
