# Tiny debug endpoint that returns the caller's real client IP as JSON.
# Bookmark in a browser to quickly verify the PROXY-protocol chain
# (VPS -> WG -> bunkerweb realip) is producing a sane $remote_addr.
# If REAL_IP_FROM ever stops covering the right bridge (e.g. pasta's
# SNAT pick shifts under a future podman update), this surfaces it
# immediately: the response shows an RFC1918 internal address instead
# of the caller's public IP.
#
# Public + unauthenticated by design: returns only the caller's own
# IP, no info they don't already have about themselves. Body kept
# minimal (just $remote_addr, no client-controllable fields like
# User-Agent) so it can't be tricked into emitting broken JSON.
# Logging stays ON so CrowdSec can still flag scanners probing the
# path.
location = /__ipcheck {
    default_type application/json;

    # XFO + CSP: server-scope more_set_headers in
    # headers-passthrough-apply.conf maps these from $upstream_http_*
    # (see http/headers-upstream-passthrough.conf), which are empty
    # here because there's no upstream (return 200, not proxy_pass).
    # An empty more_set_headers CLEARS the header, so without these
    # nested overrides /__ipcheck would ship with neither. Same trick
    # as the /robots.txt + /security.txt blocks in security-txt-lang.conf.
    more_set_headers "X-Frame-Options: SAMEORIGIN";
    more_set_headers "Content-Security-Policy: default-src 'none'; base-uri 'none'; frame-ancestors 'none'";

    # BW's headers plugin emits these on proxied paths but not on
    # return-200 paths (observed: present on /, missing here pre-fix).
    # Add them locally to match the baseline.
    add_header X-Robots-Tag "noindex, nofollow" always;
    add_header X-XSS-Protection "0" always;
    add_header Cross-Origin-Resource-Policy "same-origin" always;

    # Per-client response (the caller's own IP). No cache anywhere
    # must ever serve one client's response to another.
    add_header Cache-Control "no-store" always;

    return 200 '{"ip": "$remote_addr"}\n';
}
