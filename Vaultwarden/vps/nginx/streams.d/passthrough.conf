# nginx stream config: raw TCP passthrough from the VPS to the home
# BunkerWeb VM via the WireGuard tunnel, with PROXY protocol enabled
# so the real client IP survives the chain.
#
# Deploy to: /etc/nginx/streams.d/passthrough.conf on the VPS.
# Referenced by the `stream { include /etc/nginx/streams.d/*.conf; }`
# block in /etc/nginx/nginx.conf (see ../nginx.conf.snippet).
#
# Why this is at the stream layer (not the http layer):
# We deliberately do NOT terminate TLS here. The VPS forwards opaque
# TCP bytes; the TLS handshake completes between the external client
# and BunkerWeb at home. This keeps the Let's Encrypt private key off
# the VPS entirely. A compromise of the VPS yields nothing decryptable
# beyond the WireGuard tunnel; an observer with control of the VPS
# sees only encrypted TLS streams.
#
# Why `proxy_protocol on;` on every block:
# Without it, BunkerWeb sees `$remote_addr` as the rootlessport SNAT
# source on the home Podman bridge (e.g. 10.89.2.3) for every external
# connection. PROXY protocol prepends a small TCP-layer header to each
# upstream connection containing the original client IP + port, which
# survives both the WG tunnel and the Podman SNAT (it's L4, not L7).
# BunkerWeb has the matching receiver config: `USE_PROXY_PROTOCOL=yes`
# + `USE_REAL_IP=yes` + `REAL_IP_HEADER=proxy_protocol` + a trust list
# in REAL_IP_FROM (see ../../docker-compose.public-dns01.yml). Both
# ends MUST be in sync; one without the other breaks every connection.
#
# Why no UDP block (HTTP/3 deliberately dropped):
# PROXY protocol is TCP-only. Enabling a UDP/443 listener here while
# the BunkerWeb side enforces PROXY-protocol-receiving config would
# either reject HTTP/3 connections or leave UDP traffic with no IP
# preservation (defeating the whole reason for adding PROXY protocol).
# Clients negotiate down to HTTP/2 over TCP automatically. Minor
# extra RTT on first connect, otherwise identical UX. The trade-off
# is firmly in favor of "real IPs everywhere via PROXY protocol".
#
# Replace 192.168.50.3 with the actual BunkerWeb VM's LAN IP if
# different in your environment.

# HTTP (port 80) - kept open ONLY for the http->https 301 redirect
# that BunkerWeb auto-configures when AUTO_LETS_ENCRYPT is on.
# Port 80 is NOT used for ACME validation in this stack (DNS-01 via
# Cloudflare API handles renewals). Comment out this block AND remove
# `80/tcp` from UFW + the OPNsense pass rule if you want to close
# port 80 entirely (narrowest surface; cost is users typing the bare
# hostname without "https://" get connection refused, and external
# HTTP-probing tools can't reach the site). Only valid on the home
# `docker-compose.public-dns01.yml` flavor; `public-http01` requires
# port 80 open for ACME challenges.
server {
    listen 80;
    listen [::]:80;
    proxy_pass 192.168.50.3:80;
    proxy_protocol on;
}

# HTTPS (port 443) over TCP - HTTP/1.1 + HTTP/2 traffic.
server {
    listen 443;
    listen [::]:443;
    proxy_pass 192.168.50.3:443;
    proxy_protocol on;
}

# Adding new TCP services later: append a server block per port,
# matching the pattern of the blocks above (one block per port, with
# both `listen <port>;` for IPv4 and `listen [::]:<port>;` for IPv6,
# then `proxy_pass <backend_lan_ip>:<port>;`, plus `proxy_protocol on;`
# IF the upstream service speaks PROXY protocol; most non-HTTP
# services do not, so omit it for those). Add the matching UFW rule
# on the VPS and OPNsense pass rule on the VPS_TUNNEL interface.
# See ../README.md "Adding new services later" for the full procedure.
