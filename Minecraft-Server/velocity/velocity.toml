config-version = "2.7"

bind = "0.0.0.0:25577"
motd = "Minecraft Server"
show-max-players = 5

online-mode = true
force-key-authentication = true
prevent-client-proxy-connections = false

# Modern forwarding: Velocity passes the player's real Mojang UUID + IP to the
# Fabric backend over an authenticated handshake using the shared secret in
# ./forwarding.secret. The backend's FabricProxy-Lite mod must hold the same
# secret in /data/config/FabricProxy-Lite.toml.
player-info-forwarding-mode = "modern"

announce-forge = true
kick-existing-players = false
ping-passthrough = "disabled"
enable-player-address-logging = true

[servers]
minecraft = "minecraft:25565"
try = ["minecraft"]

[forced-hosts]

[advanced]
compression-threshold = 256
compression-level = -1
login-ratelimit = 3000
connection-timeout = 5000
read-timeout = 30000
# Accept PROXY protocol from the VPS nginx stream block so Velocity sees the
# real client IP (which it then forwards to the backend via modern forwarding).
haproxy-protocol = true

[query]
enabled = false
