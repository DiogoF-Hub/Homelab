# Append to /etc/nginx/streams.d/passthrough.conf on the VPS, alongside the
# existing 80/443 server blocks. Same shape as the Vaultwarden passthrough.
#
# proxy_protocol on; prepends a PROXY-protocol header containing the real
# client IP. Velocity (at home) reads it via haproxy-protocol = true, then
# forwards the real IP + UUID to the Fabric backend through FabricProxy-Lite
# using Velocity's modern forwarding handshake.
#
# Apply:
#   sudo nginx -t && sudo systemctl reload nginx

server {
    listen 25565;
    listen [::]:25565;
    proxy_pass 192.168.70.2:25565;
    proxy_protocol on;
}
